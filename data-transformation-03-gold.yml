        "63": city
        "64": district_member_municipality
        "65": unincorporated_area_inhabited
        "66": unincorporated_area_uninhabited
        "67": large_district_town
    - { name: federal_state_id, zfill: 2, remove: True }
    - { name: admin_district_id, zfill: 1, remove: True }
    - { name: county_id, zfill: 2, remove: True }
    - { name: association_id, zfill: 4, remove: True }
    - { name: municipality_id, zfill: 3, remove: True }
