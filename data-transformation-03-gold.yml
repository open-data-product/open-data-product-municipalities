---
attribute_groups:
  ars: &ars
    - { name: ars, concat: [ federal_state_id, admin_district_id, county_id, association_id, municipality_id ] }
    - name: type
      key: type
      mapping:
        "10": federal_state
        "20": admin_district
        "30": region
        "40": county
        "50": association
        "60": municipality
    - name: sub_type
      key: sub_type
      mapping:
        "41": independent_city
        "42": urban_district_bw
        "43": district
        "44": rural_district
        "45": regional_association_saarland
        "50": independent_municipality
        "51": administrative_office
        "52": joint_municipality_lower_saxony
        "53": collective_municipality
        "54": administrative_community
        "55": parish_land_municipality
