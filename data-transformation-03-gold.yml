        "58": fulfilling_municipality
        "60": market_town
        "61": independent_city_duplicate
        "62": urban_district_bw_duplicate
        "63": city
        "64": district_member_municipality
        "65": unincorporated_area_inhabited
        "66": unincorporated_area_uninhabited
        "67": large_district_town
    - { name: federal_state_id, zfill: 2, remove: True }
    - { name: admin_district_id, zfill: 1, remove: True }
    - { name: county_id, zfill: 2, remove: True }
    - { name: association_id, zfill: 4, remove: True }
    - { name: municipality_id, zfill: 3, remove: True }
    - { name: municipality_name }
    - { name: area_sqkm, type: float }
    - { name: population_total, type: int }
    - { name: population_male, type: int }
    - { name: population_female, type: int }
    - { name: population_per_sqkm, type: int }
    - { name: zip_code }
    - { name: center_lon, type: float }
    - { name: center_lat, type: float }
    - { name: travel_destination_key, remove: True }
    - { name: travel_destination_name,  remove: True }
    - { name: degree_of_urbanization_key }
    - { name: degree_of_urbanization_name }
  ags: &ags
    - { name: ags, concat: [ federal_state_id, admin_district_id, county_id, municipality_id ] }
    - name: type
      key: type
      mapping:
        "10": federal_state
        "20": admin_district
        "30": region
