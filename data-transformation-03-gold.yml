input_ports:
  - id: germany-municipalities-2026-03
    files:
      - source_file_name: germany-municipalities-2026-03.csv
        target_file_name: germany-municipalities-2026-03-ars.csv
        names: *ars
        filters:
          - { key: municipality_id, value: "", operation: does_not_equal }
      - source_file_name: germany-municipalities-2026-03.csv
        target_file_name: germany-municipalities-2026-03-ags.csv
        names: *ags
        filters:
          - { key: municipality_id, value: "", operation: does_not_equal }